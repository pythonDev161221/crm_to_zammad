services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: crm_zammad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - db
    restart: unless-stopped

  scheduler:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - media_data:/app/media
    depends_on:
      - db
    restart: unless-stopped
    command: >
      sh -c "echo '0 3 * * * python /app/manage.py auto_rate_tickets >> /proc/1/fd/1 2>&1' | crontab - && crond -f"

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/static
      - media_data:/media
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  static_data:
  media_data:
