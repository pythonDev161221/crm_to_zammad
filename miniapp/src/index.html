<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tech Support</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="screen-loading" class="screen active">
    <div class="loading">Connecting...</div>
  </div>

  <!-- Task List -->
  <div id="screen-tasks" class="screen">
    <div class="header">
      <h1>My Tasks</h1>
      <button id="btn-station" class="back-btn" onclick="showStationWorkers()" style="display:none">AZS &#9881;</button>
      <button class="back-btn" onclick="showScreen('screen-change-password')" title="Change password">&#128273;</button>
    </div>
    <div id="tasks-list" class="card-list"></div>
    <button id="fab-new-task" class="fab" onclick="showCreateTask()" style="display:none">+</button>
  </div>

  <!-- Task Detail -->
  <div id="screen-task-detail" class="screen">
    <div class="header">
      <h1 id="task-detail-title">Task</h1>
    </div>
    <div id="task-detail-body"></div>
  </div>

  <!-- Create Task -->
  <div id="screen-create-task" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-tasks')">&#8592; Back</button>
      <h1>New Request</h1>
    </div>
    <div class="form">
      <div class="field">
        <label>Title *</label>
        <input id="new-task-title" type="text" placeholder="Briefly describe the problem">
      </div>
      <div class="field">
        <label>Details</label>
        <textarea id="new-task-desc" placeholder="Any additional information..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitCreateTask()">Submit</button>
    </div>
  </div>

  <!-- Delegate Ticket -->
  <div id="screen-delegate" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-task-detail')">&#8592; Back</button>
      <h1>Delegate</h1>
    </div>
    <div class="form">
      <input type="hidden" id="delegate-task-id">
      <div class="field">
        <label>Select IT Worker</label>
        <div id="delegate-worker-list" class="card-list" style="padding:0"></div>
      </div>
      <div class="field">
        <label>Notes for them</label>
        <textarea id="delegate-notes" placeholder="What should they do?"></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitDelegate()">Send</button>
    </div>
  </div>

  <!-- Station Workers (manager/deputy) -->
  <div id="screen-station-workers" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-tasks')">&#8592; Back</button>
      <h1 id="station-name">My Station</h1>
    </div>
    <div id="station-workers-list" class="card-list"></div>
    <button class="fab" onclick="showScreen('screen-add-worker')">+</button>
  </div>

  <!-- Add Worker -->
  <div id="screen-add-worker" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-station-workers')">&#8592; Back</button>
      <h1>Add Worker</h1>
    </div>
    <div class="form">
      <div class="field">
        <label>First Name</label>
        <input id="new-worker-first" type="text" placeholder="Ivan">
      </div>
      <div class="field">
        <label>Last Name</label>
        <input id="new-worker-last" type="text" placeholder="Petrov">
      </div>
      <div class="field">
        <label>Username *</label>
        <input id="new-worker-username" type="text" placeholder="ivan_petrov">
      </div>
      <div class="field">
        <label>Temporary Password *</label>
        <input id="new-worker-password" type="password" placeholder="min 6 characters">
      </div>
      <button class="btn btn-primary" onclick="submitAddWorker()">Create Account</button>
    </div>
  </div>

  <!-- Change Password -->
  <div id="screen-change-password" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-tasks')">&#8592; Back</button>
      <h1>Change Password</h1>
    </div>
    <div class="form">
      <div class="field">
        <label>Current Password</label>
        <input id="old-password" type="password" placeholder="Current password">
      </div>
      <div class="field">
        <label>New Password</label>
        <input id="new-password" type="password" placeholder="Min 6 characters">
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input id="confirm-password" type="password" placeholder="Repeat new password">
      </div>
      <button class="btn btn-primary" onclick="submitChangePassword()">Save</button>
    </div>
  </div>

</div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
